openapi: 3.1.0
info:
  title: DevFlow API
  description: API for managing developer tasks and projects
  version: 1.0.0
servers:
  - url: https://YOUR_NGROK_DOMAIN_HERE.ngrok-free.app
    description: Ngrok Local Server
paths:
  /api/schema/task:
    get:
      summary: Get the JSON schema for a task
      operationId: getTaskSchema
      responses:
        '200':
          description: A JSON Schema describing the Task object
  /api/projects:
    get:
      summary: Get all projects
      operationId: getProjects
      responses:
        '200':
          description: A list of projects
    post:
      summary: Create a new project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                repoUrl:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Project created
  /api/projects/{id}:
    delete:
      summary: Delete a project
      operationId: deleteProject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project deleted
  /api/tasks:
    get:
      summary: Get all tasks
      operationId: getTasks
      responses:
        '200':
          description: A list of tasks
    post:
      summary: Create one or multiple tasks
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Task(s) created
    put:
      summary: Update or upsert multiple tasks in batch
      operationId: updateTasksBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Tasks updated
  /api/tasks/batch:
    post:
      summary: Batch create or update multiple tasks
      operationId: batchTasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Tasks processed
  /api/tasks/{id}:
    put:
      summary: Update a task
      operationId: updateTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Task updated
    delete:
      summary: Delete a task
      operationId: deleteTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted
  /api/tasks/{id}/move:
    post:
      summary: Move a task to a different status
      operationId: moveTaskStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [backlog, todo, in-progress, ready-for-review, done]
      responses:
        '200':
          description: Task status updated
  /api/tasks/{id}/checklist/toggle:
    post:
      summary: Toggle a checklist item status
      operationId: toggleTaskChecklist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                checklistId:
                  type: string
      responses:
        '200':
          description: Checklist toggled
  /api/tasks/{id}/assign:
    post:
      summary: Assign agent, model, and effort to a task
      operationId: assignTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                model:
                  type: string
                effort:
                  type: string
      responses:
        '200':
          description: Task assigned
